<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>New Tab</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Theme variables ─────────────────────────────────────────────────── */
    :root {
      --txt:        #f0f2f5;
      --txt-dim:    rgba(240, 242, 245, 0.62);
      --scrim:      linear-gradient(180deg, rgba(8,9,13,0.45) 0%, rgba(8,9,13,0.74) 100%);
      --tile-bg:    rgba(255, 255, 255, 0.09);
      --tile-bd:    rgba(255, 255, 255, 0.14);
      --tile-hover: rgba(255, 255, 255, 0.18);
      --search-bg:  rgba(18, 20, 26, 0.55);
      --search-bd:  rgba(255, 255, 255, 0.16);
      --icon-dim:   rgba(240, 242, 245, 0.5);
      --accent:     #8ab4f8;
    }
    html[data-theme="light"] {
      --txt:        #1a1c20;
      --txt-dim:    rgba(26, 28, 32, 0.6);
      --scrim:      linear-gradient(180deg, rgba(246,247,250,0.5) 0%, rgba(234,236,240,0.84) 100%);
      --tile-bg:    rgba(255, 255, 255, 0.58);
      --tile-bd:    rgba(255, 255, 255, 0.75);
      --tile-hover: rgba(255, 255, 255, 0.82);
      --search-bg:  rgba(255, 255, 255, 0.74);
      --search-bd:  rgba(255, 255, 255, 0.85);
      --icon-dim:   rgba(26, 28, 32, 0.45);
      --accent:     #1a73e8;
    }

    html, body { height: 100%; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--txt);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      user-select: none;
      overflow: hidden;
      /* Fallback gradient — shown until/if the daily photo loads */
      background: #0d1117;
      background-image:
        radial-gradient(ellipse 80% 60% at 20% 0%,  rgba(120,80,230,0.22) 0%, transparent 60%),
        radial-gradient(ellipse 70% 60% at 90% 100%, rgba(40,110,240,0.20) 0%, transparent 60%);
      transition: color 0.3s ease;
    }

    /* Daily wallpaper layer */
    #wallpaper {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 0.9s ease;
      z-index: -2;
    }
    #wallpaper.loaded { opacity: 1; }

    /* Readability scrim above the photo */
    #scrim {
      position: fixed;
      inset: 0;
      background: var(--scrim);
      z-index: -1;
      transition: background 0.3s ease;
    }

    /* ── Theme toggle (top-right) ────────────────────────────────────────── */
    #theme-toggle {
      position: fixed;
      top: 20px;
      right: 22px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--tile-bd);
      background: var(--tile-bg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 50%;
      color: var(--txt);
      cursor: pointer;
      transition: background 0.16s, transform 0.16s;
    }
    #theme-toggle:hover { background: var(--tile-hover); transform: scale(1.08); }
    #theme-toggle:active { transform: scale(0.94); }

    /* ── Centre panel ────────────────────────────────────────────────────── */
    .panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 600px;
      padding: 0 20px;
      animation: rise 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #greeting {
      font-size: 18px;
      font-weight: 400;
      color: var(--txt-dim);
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    #clock {
      font-size: 94px;
      font-weight: 200;
      letter-spacing: -4px;
      color: var(--txt);
      font-variant-numeric: tabular-nums;
      line-height: 1;
      margin-bottom: 6px;
      text-shadow: 0 2px 30px rgba(0, 0, 0, 0.35);
    }
    #clock .ampm { font-size: 30px; font-weight: 300; margin-left: 8px; letter-spacing: 0; }

    #date {
      font-size: 15px;
      color: var(--txt-dim);
      margin-bottom: 46px;
    }

    /* ── Search bar ──────────────────────────────────────────────────────── */
    .search-wrapper { width: 100%; position: relative; margin-bottom: 50px; }

    .search-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--icon-dim);
      pointer-events: none;
      display: flex;
    }

    #search-input {
      width: 100%;
      padding: 16px 22px 16px 54px;
      background: var(--search-bg);
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      border: 1px solid var(--search-bd);
      border-radius: 16px;
      color: var(--txt);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      user-select: text;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.18);
    }
    #search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(138, 180, 248, 0.18), 0 8px 30px rgba(0, 0, 0, 0.2);
    }
    #search-input::placeholder { color: var(--icon-dim); }

    /* ── Quick-access tiles ──────────────────────────────────────────────── */
    .quick-links {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      width: 100%;
    }

    .quick-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
      text-decoration: none;
      padding: 16px 8px 13px;
      border-radius: 16px;
      border: 1px solid var(--tile-bd);
      background: var(--tile-bg);
      backdrop-filter: blur(14px) saturate(160%);
      -webkit-backdrop-filter: blur(14px) saturate(160%);
      transition: background 0.16s, transform 0.16s, border-color 0.16s;
      cursor: pointer;
    }
    .quick-link:hover {
      background: var(--tile-hover);
      border-color: var(--accent);
      transform: translateY(-3px);
    }
    .quick-link:active { transform: translateY(-1px) scale(0.98); }

    .ql-icon {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 19px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
    }

    .ql-name {
      font-size: 12px;
      color: var(--txt-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    /* Photo credit (bottom-left) */
    #credit {
      position: fixed;
      left: 16px;
      bottom: 12px;
      font-size: 10.5px;
      color: var(--txt-dim);
      opacity: 0.7;
    }
  </style>
</head>
<body>

<div id="wallpaper"></div>
<div id="scrim"></div>

<button id="theme-toggle" title="Toggle light / dark">
  <!-- moon (shown in dark mode) -->
  <svg id="ic-moon" width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
    <path d="M15.5 11.4A7 7 0 0 1 6.6 2.5a7 7 0 1 0 8.9 8.9z"/>
  </svg>
  <!-- sun (shown in light mode) -->
  <svg id="ic-sun" width="18" height="18" viewBox="0 0 18 18" fill="none"
       stroke="currentColor" stroke-width="1.7" stroke-linecap="round" style="display:none">
    <circle cx="9" cy="9" r="3.6"/>
    <path d="M9 1v2M9 15v2M1 9h2M15 9h2M3.3 3.3l1.4 1.4M13.3 13.3l1.4 1.4M3.3 14.7l1.4-1.4M13.3 4.7l1.4-1.4"/>
  </svg>
</button>

<div class="panel">

  <div id="greeting">Good morning</div>
  <div id="clock">00:00</div>
  <div id="date">Loading…</div>

  <form class="search-wrapper" id="search-form" autocomplete="off">
    <span class="search-icon">
      <svg width="19" height="19" viewBox="0 0 18 18" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="7.5" cy="7.5" r="5.5"/>
        <line x1="11.5" y1="11.5" x2="16.5" y2="16.5"/>
      </svg>
    </span>
    <input id="search-input" type="text"
           placeholder="Search Google or type a URL…"
           spellcheck="false" autofocus />
  </form>

  <div class="quick-links">
    <a class="quick-link" href="https://www.google.com">
      <div class="ql-icon" style="background:#4285F4;font-size:24px">G</div>
      <span class="ql-name">Google</span>
    </a>
    <a class="quick-link" href="https://www.youtube.com">
      <div class="ql-icon" style="background:#FF0000">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="white"><polygon points="7,5 16,10 7,15"/></svg>
      </div>
      <span class="ql-name">YouTube</span>
    </a>
    <a class="quick-link" href="https://www.github.com">
      <div class="ql-icon" style="background:#24292e">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.54-1.38-1.33-1.75-1.33-1.75-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23.96-.27 1.98-.4 3-.41 1.02.01 2.04.14 3 .41 2.28-1.55 3.29-1.23 3.29-1.23.66 1.65.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.21.69.82.57C20.57 21.8 24 17.31 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
      </div>
      <span class="ql-name">GitHub</span>
    </a>
    <a class="quick-link" href="https://www.reddit.com">
      <div class="ql-icon" style="background:#FF4500;font-size:16px;font-weight:800">r/</div>
      <span class="ql-name">Reddit</span>
    </a>
    <a class="quick-link" href="https://stackoverflow.com">
      <div class="ql-icon" style="background:#F48024;font-size:14px;letter-spacing:-1px">{;}</div>
      <span class="ql-name">Stack Overflow</span>
    </a>
    <a class="quick-link" href="https://www.wikipedia.org">
      <div class="ql-icon" style="background:#3a3a3a;font-size:22px">W</div>
      <span class="ql-name">Wikipedia</span>
    </a>
    <a class="quick-link" href="https://www.twitter.com">
      <div class="ql-icon" style="background:#000;font-size:20px;font-family:serif">𝕏</div>
      <span class="ql-name">Twitter / X</span>
    </a>
    <a class="quick-link" href="https://discord.com">
      <div class="ql-icon" style="background:#5865F2;font-size:16px;font-weight:800">D</div>
      <span class="ql-name">Discord</span>
    </a>
  </div>

</div>

<div id="credit">Daily photo · Lorem Picsum</div>

<script>
'use strict'

/* ── Theme ──────────────────────────────────────────────────────────────────
   Reads the shared "mybrowser-theme" key (set by the browser's theme menu).
   - 'dark' / 'light'  → use it directly
   - 'system' or none  → follow the OS setting
   The toggle button here flips dark ⇄ light and saves the choice.          */

const root  = document.documentElement
const media = window.matchMedia('(prefers-color-scheme: dark)')

function readMode() {
  try {
    const m = localStorage.getItem('mybrowser-theme')
    if (m === 'dark' || m === 'light' || m === 'system') return m
  } catch (_) {}
  return 'system'
}

function resolve(mode) {
  if (mode === 'system') return media.matches ? 'dark' : 'light'
  return mode
}

function applyTheme() {
  const resolved = resolve(readMode())
  root.dataset.theme = resolved
  document.getElementById('ic-moon').style.display = resolved === 'dark' ? 'block' : 'none'
  document.getElementById('ic-sun').style.display  = resolved === 'dark' ? 'none'  : 'block'
}

applyTheme()
media.addEventListener('change', () => { if (readMode() === 'system') applyTheme() })

document.getElementById('theme-toggle').addEventListener('click', () => {
  const next = resolve(readMode()) === 'dark' ? 'light' : 'dark'
  try { localStorage.setItem('mybrowser-theme', next) } catch (_) {}
  applyTheme()
})

/* ── Daily wallpaper ────────────────────────────────────────────────────────
   Lorem Picsum — free, no API key. The seed is today's date, so everyone
   gets one fresh photo per day. If offline, the CSS gradient stays.         */

const seed = new Date().toISOString().slice(0, 10)
const wallUrl = `https://picsum.photos/seed/mybrowser-${seed}/1600/900`
const wallEl  = document.getElementById('wallpaper')
const probe   = new Image()
probe.onload  = () => {
  wallEl.style.backgroundImage = `url("${wallUrl}")`
  wallEl.classList.add('loaded')
}
probe.onerror = () => { document.getElementById('credit').style.display = 'none' }
probe.src = wallUrl

/* ── Clock, date, greeting ──────────────────────────────────────────────── */

function tick() {
  const now = new Date()
  let h = now.getHours()
  const m   = String(now.getMinutes()).padStart(2, '0')
  const ampm = h >= 12 ? 'PM' : 'AM'
  let h12 = h % 12; if (h12 === 0) h12 = 12

  document.getElementById('clock').innerHTML =
    `${h12}:${m}<span class="ampm">${ampm}</span>`

  document.getElementById('greeting').textContent =
    h >= 5 && h < 12  ? 'Good morning'   :
    h >= 12 && h < 17 ? 'Good afternoon' :
    h >= 17 && h < 21 ? 'Good evening'   : 'Good night'

  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']
  const months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December']
  document.getElementById('date').textContent =
    `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`
}

tick()
setInterval(tick, 1000)

/* ── Search ─────────────────────────────────────────────────────────────── */

document.getElementById('search-form').addEventListener('submit', (e) => {
  e.preventDefault()
  const q = document.getElementById('search-input').value.trim()
  if (!q) return
  if (/^https?:\/\//i.test(q)) location.href = q
  else if (/^[\w-]+(\.[\w-]+)+/.test(q) && !q.includes(' ')) location.href = 'https://' + q
  else location.href = 'https://www.google.com/search?q=' + encodeURIComponent(q)
})
</script>
</body>
</html>
