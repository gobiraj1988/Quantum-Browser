<!-- AI Sidebar — injected into #main-area by ai-sidebar.js -->
<div class="ai-header">
  <svg class="ai-header-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"
       stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="8,1 10,6 15,6.5 11,10 12.5,15 8,12.5 3.5,15 5,10 1,6.5 6,6"/>
  </svg>
  <span class="ai-header-title">AI Assistant</span>
  <span class="ai-provider-badge" id="ai-provider-badge">Free AI</span>
  <button class="ai-header-btn" id="ai-clear-btn" title="Clear chat history">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor"
         stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 3h9M5 3V2h3v1M3.5 3l.5 8h5l.5-8"/>
    </svg>
  </button>
  <button class="ai-header-btn" id="ai-close-btn" title="Close sidebar">✕</button>
</div>

<!-- Summarize button — one click, instant summary -->
<div class="ai-actions">
  <button class="ai-summarize-btn" id="ai-summarize-btn">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor"
         stroke-width="1.7" stroke-linecap="round">
      <path d="M1 2.5h11M1 6h8M1 9.5h5"/>
    </svg>
    Summarize this page
  </button>
</div>

<!-- Quick tool buttons (2×3 grid) -->
<div class="ai-tools-grid">
  <button class="ai-tool-btn" id="ai-facts-btn" title="List key facts from this page">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor"
         stroke-width="1.7" stroke-linecap="round">
      <circle cx="5" cy="5" r="3.5"/>
      <path d="M7.5 7.5L11 11"/>
    </svg>
    Find Facts
  </button>
  <button class="ai-tool-btn" id="ai-translate-btn" title="Translate this page (full page via LibreTranslate)">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor"
         stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="6" cy="6" r="5"/>
      <path d="M6 1C6 1 4 4 4 6s2 5 2 5M6 1c0 0 2 3 2 5S6 11 6 11M1 6h10"/>
    </svg>
    Translate
  </button>
  <button class="ai-tool-btn" id="ai-grammar-btn" title="Select text on the page, then click">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor"
         stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 9l3-7 3 7M3.5 7h3"/>
      <path d="M9 5c.8 0 1.5.4 1.5 1.5S10 9 9 9H7.5V5H9z"/>
    </svg>
    Grammar
  </button>
  <button class="ai-tool-btn" id="ai-explain-btn" title="Select text on the page, then click">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor"
         stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="6" cy="5" r="3.5"/>
      <path d="M6 8.5v.5M5 11h2"/>
    </svg>
    Explain
  </button>
  <button class="ai-tool-btn" id="ai-reader-btn" title="Open this page in clean reading mode with AI summary"
          style="grid-column: span 2;">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor"
         stroke-width="1.7" stroke-linecap="round">
      <rect x="1" y="1" width="10" height="10" rx="1.5"/>
      <line x1="3.5" y1="4"   x2="8.5" y2="4"/>
      <line x1="3.5" y1="6"   x2="8.5" y2="6"/>
      <line x1="3.5" y1="8"   x2="6"   y2="8"/>
    </svg>
    Reading Mode  <small style="opacity:.55;font-size:10px;margin-left:4px">+ AI summary</small>
  </button>
</div>

<!-- Translate language picker (shown when Translate button is clicked) -->
<div class="ai-translate-row" id="ai-translate-row">
  <select class="ai-lang-select" id="ai-lang-select">
    <option value="">Choose language…</option>
    <option>Arabic</option>
    <option>Chinese (Simplified)</option>
    <option>Dutch</option>
    <option>English</option>
    <option>French</option>
    <option>German</option>
    <option>Hindi</option>
    <option>Indonesian</option>
    <option>Italian</option>
    <option>Japanese</option>
    <option>Korean</option>
    <option>Polish</option>
    <option>Portuguese</option>
    <option>Russian</option>
    <option>Spanish</option>
    <option>Swedish</option>
    <option>Tamil</option>
    <option>Turkish</option>
    <option>Ukrainian</option>
    <option>Vietnamese</option>
  </select>
  <button class="ai-translate-go" id="ai-translate-go" disabled>Go</button>
</div>

<!-- Chat message history -->
<div class="ai-chat-area" id="ai-chat-area"></div>

<!-- Input row — ask anything -->
<div class="ai-input-row">
  <textarea class="ai-input" id="ai-input" rows="1"
    placeholder="Ask about this page… (Enter to send, Shift+Enter for newline)"></textarea>
  <button class="ai-send-btn" id="ai-send-btn" title="Send (Enter)">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M7 12V2M2 7l5-5 5 5"/>
    </svg>
  </button>
</div>
