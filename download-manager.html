<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Download Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #202124;
      --bg2:       #2a2b2f;
      --bg3:       #35363a;
      --border:    rgba(255,255,255,0.07);
      --accent:    #8ab4f8;
      --green:     #81c995;
      --yellow:    #fbbf24;
      --red:       #f28b82;
      --purple:    #c084fc;
      --text:      #e8eaed;
      --muted:     #9aa0a6;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ── Header ─────────────────────────────────────────────────────────────── */

    #header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 14px 18px 12px;
      flex-shrink: 0;
    }

    #title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 11px;
    }

    .hdr-icon {
      width: 30px; height: 30px;
      background: rgba(138,180,248,0.12);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent); flex-shrink: 0;
    }

    #title-row h1 { font-size: 15px; font-weight: 600; flex: 1; }

    #active-badge {
      font-size: 11px; font-weight: 700;
      background: rgba(138,180,248,0.14);
      color: var(--accent);
      padding: 3px 9px; border-radius: 10px;
    }
    #active-badge.zero { background: rgba(255,255,255,0.05); color: var(--muted); }

    #search-row { display: flex; gap: 8px; align-items: center; }

    #search {
      flex: 1;
      background: var(--bg3);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 7px;
      padding: 7px 12px;
      color: var(--text); font-size: 12.5px; outline: none;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: #555; }

    #btn-clear {
      background: rgba(242,139,130,0.1);
      border: 1px solid rgba(242,139,130,0.22);
      border-radius: 7px;
      color: var(--red); font-size: 12px;
      padding: 7px 13px; cursor: pointer;
      white-space: nowrap; transition: background 0.12s;
    }
    #btn-clear:hover { background: rgba(242,139,130,0.2); }

    .hdr-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 7px; color: var(--text); font-size: 12px;
      padding: 6px 12px; cursor: pointer; white-space: nowrap;
      display: inline-flex; align-items: center; gap: 5px;
      transition: background 0.12s;
    }
    .hdr-btn:hover { background: rgba(255,255,255,0.12); }
    #btn-bulk { color: var(--purple); border-color: rgba(192,132,252,0.25); }
    #btn-bulk:hover { background: rgba(192,132,252,0.12); }
    #btn-export-csv { color: var(--green); border-color: rgba(129,201,149,0.25); }
    #btn-export-csv:hover { background: rgba(129,201,149,0.12); }

    /* ── Scrollable content ──────────────────────────────────────────────────── */

    #main { flex: 1; overflow-y: auto; min-height: 0; }
    #main::-webkit-scrollbar { width: 5px; }
    #main::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    /* ── Section labels ──────────────────────────────────────────────────────── */

    .sec-label {
      padding: 10px 18px 7px;
      font-size: 10.5px; font-weight: 700;
      color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em;
      position: sticky; top: 0;
      background: var(--bg); z-index: 10;
      border-bottom: 1px solid var(--border);
    }

    .empty { padding: 24px 18px; text-align: center; color: #555; font-size: 12.5px; }

    /* ── Download item (active) ──────────────────────────────────────────────── */

    .dl-item {
      padding: 13px 18px 11px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.08s;
    }
    .dl-item:hover { background: rgba(255,255,255,0.02); }

    /* Row 1: icon + info + buttons */
    .dl-r1 { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }

    .dl-icon {
      width: 34px; height: 34px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 15px;
    }
    .ico-video   { background: rgba(138,180,248,0.12); color: var(--accent); }
    .ico-audio   { background: rgba(192,132,252,0.12); color: var(--purple); }
    .ico-done    { background: rgba(129,201,149,0.12); color: var(--green); }
    .ico-error   { background: rgba(242,139,130,0.12); color: var(--red); }
    .ico-paused  { background: rgba(251,191,36,0.12);  color: var(--yellow); }

    .dl-info { flex: 1; min-width: 0; }
    .dl-name {
      font-size: 13px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px;
    }
    .dl-url { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .dl-btns { display: flex; gap: 4px; flex-shrink: 0; align-items: flex-start; }

    .db {
      width: 28px; height: 28px;
      border: none; border-radius: 6px;
      background: rgba(255,255,255,0.06);
      color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; transition: background 0.1s, color 0.1s;
    }
    .db:hover               { background: rgba(255,255,255,0.12); color: var(--text); }
    .db.pause:hover         { color: var(--yellow); }
    .db.resume:hover        { color: var(--green); }
    .db.cancel:hover        { color: var(--red); }
    .db.open-file:hover     { color: var(--accent); }
    .db.show-folder:hover   { color: var(--accent); }
    .db.dismiss:hover       { color: var(--red); }

    /* Row 2: progress bar */
    .dl-r2 { display: flex; align-items: center; gap: 9px; margin-bottom: 6px; }

    .dl-bar-bg {
      flex: 1; height: 5px; background: rgba(255,255,255,0.08);
      border-radius: 3px; overflow: hidden;
    }
    .dl-bar {
      height: 100%; border-radius: 3px; transition: width 0.35s ease;
      background: var(--accent);
    }
    .dl-bar.paused   { background: var(--yellow); }
    .dl-bar.complete { background: var(--green); }
    .dl-bar.error    { background: var(--red); width: 100% !important; }
    .dl-bar.starting { background: var(--accent); animation: barPulse 1.2s infinite; }
    @keyframes barPulse { 0%,100% { opacity: 0.35; } 50% { opacity: 1; } }

    .dl-pct {
      font-size: 11.5px; font-weight: 700; color: var(--muted);
      min-width: 36px; text-align: right; font-variant-numeric: tabular-nums;
    }

    /* Row 3: stats + status chip */
    .dl-r3 { display: flex; align-items: center; gap: 14px; font-size: 11px; color: var(--muted); flex-wrap: wrap; }

    .dl-stat { display: flex; gap: 3px; }
    .stat-lbl { opacity: 0.65; }
    .stat-val { color: #c8cacc; font-variant-numeric: tabular-nums; }

    .chip {
      margin-left: auto; font-size: 10.5px; font-weight: 700;
      padding: 2px 8px; border-radius: 8px;
    }
    .chip-downloading { background: rgba(138,180,248,0.12); color: var(--accent); }
    .chip-starting    { background: rgba(138,180,248,0.07); color: var(--accent); }
    .chip-paused      { background: rgba(251,191,36,0.12);  color: var(--yellow); }
    .chip-complete    { background: rgba(129,201,149,0.12); color: var(--green); }
    .chip-error       { background: rgba(242,139,130,0.12); color: var(--red); }
    .chip-cancelled   { background: rgba(255,255,255,0.06); color: var(--muted); }

    /* ── History item (compact) ──────────────────────────────────────────────── */

    .hist-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.08s;
    }
    .hist-item:hover { background: rgba(255,255,255,0.02); }

    .hist-icon {
      width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 12px;
    }
    .hist-info { flex: 1; min-width: 0; }
    .hist-name {
      font-size: 12.5px; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px;
    }
    .hist-meta { font-size: 10.5px; color: var(--muted); }
    .hist-btns { display: flex; gap: 4px; flex-shrink: 0; }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Header ──────────────────────────────────────────────────────────────── -->
  <div id="header">
    <div id="title-row">
      <div class="hdr-icon">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"
             stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="7.5" y1="0.5" x2="7.5" y2="10.5"/>
          <polyline points="3.5 6.5 7.5 10.5 11.5 6.5"/>
          <line x1="1" y1="14" x2="14" y2="14"/>
        </svg>
      </div>
      <h1>Download Manager</h1>
      <span id="active-badge" class="zero">0 active</span>
      <button class="hdr-btn" id="btn-bulk" title="Open Bulk Downloader">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <line x1="6" y1="0.5" x2="6" y2="7.5"/><polyline points="3 5 6 7.5 9 5"/>
          <line x1="1" y1="10" x2="11" y2="10"/>
          <line x1="1" y1="0.5" x2="1" y2="4"/><line x1="11" y1="0.5" x2="11" y2="4"/>
        </svg>
        Bulk Download
      </button>
      <button class="hdr-btn" id="btn-export-csv" title="Export history as CSV">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="1" width="10" height="10" rx="1"/>
          <line x1="1" y1="4" x2="11" y2="4"/><line x1="4" y1="4" x2="4" y2="11"/>
        </svg>
        Export CSV
      </button>
    </div>
    <div id="search-row">
      <input id="search" type="text" placeholder="Search by filename or URL…"
             autocomplete="off" spellcheck="false">
      <button id="btn-clear">Clear History</button>
    </div>
  </div>

  <!-- ── Content ─────────────────────────────────────────────────────────────── -->
  <div id="main">

    <div class="sec-label">Active Downloads</div>
    <div id="list-active"></div>
    <div id="empty-active" class="empty">No active downloads. Start one from the browser.</div>

    <div class="sec-label">History</div>
    <div id="list-history"></div>
    <div id="empty-history" class="empty">Download history will appear here.</div>

  </div>
</div>
<script src="download-manager.js"></script>
</body>
</html>
